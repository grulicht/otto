# OTTO - Default Configuration
# This file contains all available options with their defaults.
# User overrides go in: ~/.config/otto/config.yaml

# --- User Profile ---
user:
  # Experience level affects verbosity and explanations
  # auto = OTTO detects from interactions
  experience_level: auto  # beginner | intermediate | advanced | expert | auto

  # Your primary role (affects agent priorities and recommendations)
  role: devops_engineer  # devops_engineer | sre | platform_engineer | developer | sysadmin | security_engineer | manager | student

  # Preferred tools (OTTO will prioritize these in suggestions)
  preferred_tools:
    iac: terraform            # terraform | opentofu | ansible
    cicd: github_actions      # gitlab_ci | github_actions | jenkins | argocd | bitbucket
    containers: kubernetes    # kubernetes | docker_compose | podman
    monitoring: grafana       # grafana | zabbix | datadog | elk | newrelic
    communication: slack      # slack | telegram | rocketchat | teams | discord | email

# --- Permission System ---
permissions:
  # Global default for all actions
  default_mode: suggest  # deny | suggest | confirm | auto

  # Per-environment overrides
  environments:
    development:
      default: auto
    staging:
      default: confirm
    production:
      default: suggest
      destructive: deny

  # Per-domain rules
  domains:
    infrastructure:
      read_state: auto
      plan: auto
      apply: confirm
      destroy: deny
      import: confirm

    kubernetes:
      get: auto
      describe: auto
      logs: auto
      scale: confirm
      apply: confirm
      delete: deny
      exec: confirm
      rollback: confirm

    ci_cd:
      view: auto
      trigger_build: confirm
      retry_job: auto
      cancel_job: confirm
      modify_pipeline: suggest
      deploy: confirm

    monitoring:
      query: auto
      create_alert: confirm
      silence_alert: confirm
      acknowledge: auto
      dashboard_edit: confirm

    database:
      select: auto
      explain: auto
      migrate_dry_run: auto
      migrate_execute: confirm
      backup: auto
      restore: confirm
      drop: deny

    security:
      scan: auto
      rotate_secret: confirm
      modify_policy: suggest
      revoke_access: deny

    communication:
      read: auto
      send_dm: auto
      send_channel: confirm
      create_incident: confirm
      page_oncall: suggest

    git:
      read: auto
      commit: confirm
      push: confirm
      force_push: deny
      branch_delete: confirm

    scripts:
      dry_run: auto
      execute_safe: confirm
      execute_unsafe: suggest

    servers:
      read_status: auto
      restart_service: confirm
      modify_config: suggest
      reboot: deny

    backup:
      create: auto
      list: auto
      restore: confirm
      delete: deny

# --- Communication Channels ---
communication:
  # Primary channel for reports and briefings
  primary: slack

  channels:
    slack:
      enabled: false
      # bot_token: ${OTTO_SLACK_TOKEN}       # Set in .env
      # channel_id: ${OTTO_SLACK_CHANNEL_ID} # Set in .env

    telegram:
      enabled: false
      # token: ${OTTO_TELEGRAM_TOKEN}        # Set in .env
      # chat_id: ${OTTO_TELEGRAM_CHAT_ID}    # Set in .env

    rocketchat:
      enabled: false
      # url: ${OTTO_ROCKETCHAT_URL}          # Set in .env

    teams:
      enabled: false
      # webhook_url: ${OTTO_TEAMS_WEBHOOK_URL}  # Set in .env

    discord:
      enabled: false
      # token: ${OTTO_DISCORD_TOKEN}         # Set in .env

    email:
      enabled: false
      # host: ${OTTO_SMTP_HOST}              # Set in .env
      # port: 587

# --- Heartbeat ---
heartbeat:
  # Base interval in seconds
  interval: 600  # 10 minutes
  # Adaptive intervals
  adaptive: true
  min_interval: 300   # 5 minutes (active)
  max_interval: 3600  # 60 minutes (idle)
  # Turbo mode: rapid polling for 30 minutes
  turbo_interval: 60
  turbo_duration: 1800

# --- Night Watcher ---
night_watcher:
  enabled: false
  schedule:
    start: "22:00"
    end: "07:00"
    timezone: "Europe/Prague"
  heartbeat_interval: 900  # 15 minutes

  checks:
    system_health: true
    monitoring_alerts: true
    cicd_pipelines: true
    kubernetes_pods: true
    security_events: true
    database_health: true
    ssl_certificates: true
    backup_status: true
    log_anomalies: true

  critical_escalation:
    enabled: true
    cooldown: 1800  # 30 minutes between escalations

  auto_remediation:
    enabled: false
    allowed_actions:
      - restart_crashed_pods
      - clear_disk_space_temp
      - rotate_logs
    forbidden_actions:
      - scale_infrastructure
      - modify_configs
      - database_operations

  morning_report:
    format: detailed  # brief | detailed | executive
    include_trends: true
    include_predictions: true

# --- Task Management ---
tasks:
  wip_limit: 3
  auto_assign: true
  model_selection:
    small: haiku
    medium: sonnet
    large: opus

# --- Knowledge Base ---
knowledge:
  # Auto-archive thresholds
  archive:
    journals_days: 14
    weekly_summaries_weeks: 8
    decisions_days: 90

# --- Logging ---
logging:
  level: info  # debug | info | warn | error
  format: json  # json | human
  file: state/log.jsonl
  max_size_mb: 50
  rotate: true

# --- Alert Routing ---
alert_routing:
  enabled: false
  default_targets: []
  rules: []
  # Example:
  # - match: { severity: critical }
  #   notify: [slack_oncall, pagerduty]
  # - match: { severity: warning, domain: kubernetes }
  #   notify: [slack_channel]
  # - match: { severity: info }
  #   notify: [email_digest]

# --- Language ---
language: en  # en | cs | de | es | fr | ja | ...

# --- Scheduled Checks ---
scheduled_checks: []
# Example:
# - name: ssl-weekly
#   cron: "0 9 * * 1"
#   check: ssl-certs
#   alert_if: "days_remaining < 30"
